{% extends "base.html" %}

{% block title %}蛋白质评估 - 蛋白评估系统{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/template-ui.css') }}">
{% endblock %}

{% block content %}
<div id="app" class="template-app">
    <header class="template-header">
        <div class="header-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="brand-text">
                <h1>蛋白质结构评估系统</h1>
                <p>Protein Structure Evaluation Platform</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="#/" class="nav-link" data-i18n="nav.dashboard">仪表盘</a>
            <a href="#/jobs/new" class="nav-link" data-i18n="nav.newJob">新建任务</a>
            <a href="#/settings" class="nav-link" data-i18n="nav.settings">设置</a>
            <a href="#/templates" class="nav-link" data-i18n="nav.templates">模板</a>
        </nav>
        <div class="header-actions">
            <button id="lang-toggle" class="btn-secondary">EN</button>
        </div>
    </header>

    <main class="template-main" id="main-content">
        <!-- Content loaded dynamically by router -->
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p data-i18n="common.loading">加载中...</p>
        </div>
    </main>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
<script src="{{ url_for('static', filename='js/api-client.js') }}"></script>
<script src="{{ url_for('static', filename='js/sse-manager.js') }}"></script>
<script src="{{ url_for('static', filename='js/template-ui.js') }}"></script>
{% endblock %}
